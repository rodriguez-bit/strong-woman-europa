services:
  - type: web
    name: strong-woman-europa
    runtime: node
    plan: free
    buildCommand: export NODE_ENV=development && cd client && npm install && npm run build && cd ../server && npm install && npm run build
    startCommand: cd server && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_PATH
        value: /opt/render/project/src/server/data/database.sqlite
